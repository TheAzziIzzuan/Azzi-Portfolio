<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  
  <rect width="320" height="180" fill="url(#bg)"/>
  
  <!-- Phone outline -->
  <rect x="120" y="15" width="80" height="150" rx="10" fill="#111" stroke="#ab47bc" stroke-width="1.5"/>
  <rect x="126" y="28" width="68" height="120" rx="2" fill="#1a1a2e"/>
  
  <!-- Phone notch -->
  <rect x="148" y="18" width="24" height="6" rx="3" fill="#222"/>
  
  <!-- Phone home button -->
  <circle cx="160" cy="155" r="5" fill="none" stroke="#333" stroke-width="1"/>
  
  <!-- App content - fake social feed -->
  <rect x="130" y="32" width="60" height="8" rx="2" fill="#ab47bc" opacity="0.6"/>
  <rect x="130" y="44" width="60" height="30" rx="2" fill="#222"/>
  <rect x="130" y="78" width="40" height="4" rx="1" fill="#444"/>
  <rect x="130" y="86" width="55" height="3" rx="1" fill="#333"/>
  <rect x="130" y="93" width="60" height="30" rx="2" fill="#222"/>
  <rect x="130" y="127" width="35" height="4" rx="1" fill="#444"/>
  <rect x="130" y="135" width="50" height="3" rx="1" fill="#333"/>
  
  <!-- Data streams flowing out of phone (malicious) -->
  <!-- Left side - contacts -->
  <line x1="120" y1="60" x2="55" y2="40" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <line x1="120" y1="70" x2="50" y2="65" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="120" y1="100" x2="45" y2="90" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  
  <!-- Right side - location/sensor -->
  <line x1="200" y1="55" x2="265" y2="35" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <line x1="200" y1="80" x2="270" y2="70" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="200" y1="110" x2="260" y2="100" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  
  <!-- Left icons - contacts -->
  <g transform="translate(30, 30)">
    <circle cx="12" cy="6" r="5" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
    <path d="M3,18 Q12,14 21,18" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
  </g>
  
  <!-- Left icon - SMS -->
  <g transform="translate(25, 75)">
    <rect x="2" y="2" width="18" height="14" rx="3" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.7"/>
    <polyline points="2,2 11,10 20,2" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.7"/>
  </g>
  
  <!-- Right icon - GPS -->
  <g transform="translate(255, 25)">
    <circle cx="10" cy="8" r="4" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
    <path d="M10,12 L10,22" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
    <path d="M5,18 L10,22 L15,18" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
  </g>
  
  <!-- Right icon - sensor -->
  <g transform="translate(250, 85)">
    <polyline points="2,15 7,5 12,12 17,3 22,10" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Lock/shield icon (broken) -->
  <g transform="translate(65, 110)" opacity="0.4">
    <path d="M10,5 L10,0 Q10,-5 15,-5 Q20,-5 20,0 L20,5" fill="none" stroke="#ef5350" stroke-width="1.5"/>
    <rect x="5" y="5" width="20" height="15" rx="2" fill="none" stroke="#ef5350" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="25" y2="20" stroke="#ef5350" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="160" y="172" fill="#ccc" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">MOBILE SECURITY</text>
</svg>
