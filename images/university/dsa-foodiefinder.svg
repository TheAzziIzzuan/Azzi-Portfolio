<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3320" />
      <stop offset="100%" stop-color="#1a6b3c" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" />
  <rect x="40" y="40" width="520" height="320" rx="16" ry="16" fill="#0a2a18" stroke="#4ade80" stroke-width="2" />
  <!-- Map pin icons -->
  <circle cx="180" cy="160" r="8" fill="#4ade80" />
  <circle cx="300" cy="120" r="8" fill="#86efac" />
  <circle cx="420" cy="180" r="8" fill="#4ade80" />
  <circle cx="250" cy="220" r="8" fill="#86efac" />
  <circle cx="350" cy="200" r="8" fill="#4ade80" />
  <!-- Connection lines (Dijkstra paths) -->
  <line x1="180" y1="160" x2="300" y2="120" stroke="#4ade80" stroke-width="1.5" opacity="0.5" />
  <line x1="300" y1="120" x2="420" y2="180" stroke="#4ade80" stroke-width="1.5" opacity="0.5" />
  <line x1="250" y1="220" x2="350" y2="200" stroke="#4ade80" stroke-width="1.5" opacity="0.5" />
  <line x1="180" y1="160" x2="250" y2="220" stroke="#4ade80" stroke-width="1.5" opacity="0.5" />
  <line x1="350" y1="200" x2="420" y2="180" stroke="#4ade80" stroke-width="1.5" opacity="0.5" />
  <!-- Fork/knife icon suggestion -->
  <text x="300" y="270" font-size="40" text-anchor="middle" fill="#4ade80" opacity="0.3">🍽</text>
  <!-- Text -->
  <g fill="#d1fae5" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="300" y="325" font-size="22" font-weight="700">FoodieFinder</text>
    <text x="300" y="350" font-size="13" opacity="0.95">DSA · Dijkstra · Trie · Web Scraping · Flask</text>
  </g>
</svg>
