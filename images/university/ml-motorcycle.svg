<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
  </defs>
  
  <rect width="320" height="180" fill="url(#bg)"/>
  
  <!-- Chart area -->
  <line x1="50" y1="30" x2="50" y2="130" stroke="#334" stroke-width="1"/>
  <line x1="50" y1="130" x2="280" y2="130" stroke="#334" stroke-width="1"/>
  
  <!-- Grid lines -->
  <line x1="50" y1="55" x2="280" y2="55" stroke="#223" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="50" y1="80" x2="280" y2="80" stroke="#223" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="50" y1="105" x2="280" y2="105" stroke="#223" stroke-width="0.5" stroke-dasharray="3,3"/>
  
  <!-- Scatter points (actual vs predicted) -->
  <circle cx="70" cy="110" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="85" cy="95" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="100" cy="88" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="115" cy="75" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="130" cy="65" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="145" cy="60" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="160" cy="52" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="170" cy="48" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="190" cy="42" r="3" fill="#42a5f5" opacity="0.7"/>
  <circle cx="210" cy="38" r="3" fill="#42a5f5" opacity="0.7"/>
  
  <!-- Trend line -->
  <line x1="60" y1="118" x2="220" y2="35" stroke="#ffa726" stroke-width="1.5" opacity="0.8"/>
  
  <!-- More scatter points (noise) -->
  <circle cx="78" cy="102" r="2.5" fill="#66bb6a" opacity="0.6"/>
  <circle cx="108" cy="82" r="2.5" fill="#66bb6a" opacity="0.6"/>
  <circle cx="122" cy="72" r="2.5" fill="#66bb6a" opacity="0.6"/>
  <circle cx="152" cy="55" r="2.5" fill="#66bb6a" opacity="0.6"/>
  <circle cx="180" cy="45" r="2.5" fill="#66bb6a" opacity="0.6"/>
  <circle cx="200" cy="40" r="2.5" fill="#66bb6a" opacity="0.6"/>
  
  <!-- Y axis label -->
  <text x="20" y="80" fill="#888" font-family="monospace" font-size="6" text-anchor="middle" transform="rotate(-90, 20, 80)">Price (SGD)</text>
  
  <!-- X axis label -->
  <text x="165" y="145" fill="#888" font-family="monospace" font-size="6" text-anchor="middle">Features</text>
  
  <!-- Model labels -->
  <rect x="230" y="40" width="6" height="6" rx="1" fill="#42a5f5"/>
  <text x="240" y="46" fill="#aaa" font-family="sans-serif" font-size="6">RF</text>
  <rect x="230" y="52" width="6" height="6" rx="1" fill="#66bb6a"/>
  <text x="240" y="58" fill="#aaa" font-family="sans-serif" font-size="6">XGB</text>
  <rect x="230" y="64" width="6" height="6" rx="1" fill="#ffa726"/>
  <text x="240" y="70" fill="#aaa" font-family="sans-serif" font-size="6">SVM</text>
  
  <!-- Motorcycle silhouette -->
  <g transform="translate(235, 85) scale(0.6)" opacity="0.5">
    <ellipse cx="15" cy="30" rx="12" ry="12" fill="none" stroke="#42a5f5" stroke-width="2"/>
    <ellipse cx="65" cy="30" rx="12" ry="12" fill="none" stroke="#42a5f5" stroke-width="2"/>
    <path d="M15,18 L30,5 L55,5 L65,18" fill="none" stroke="#42a5f5" stroke-width="2"/>
    <line x1="27" y1="30" x2="53" y2="30" stroke="#42a5f5" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="160" y="170" fill="#ccc" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">ML PRICE PREDICTION</text>
</svg>
